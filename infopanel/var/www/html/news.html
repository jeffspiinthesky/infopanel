<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<script language="javascript">
			function showRSS() {
				var news = document.getElementById("news");
				var x = new XMLHttpRequest();
				x.open("GET", "news.php", true);	
				x.onreadystatechange=function() {
					if (this.readyState==4 && this.status==200) {
						news.innerHTML=x.responseText;
					}
				}
				x.send();
				setTimeout(showRSS,900000);
			}
			window.onload=showRSS;
		</script>
		<link href="news.css" rel="stylesheet" />
	</head>

	<body>
        	<div class="news" id="news">&nbsp;</div>	
	</body>
</html>
