<link href="{{ url_for('static', filename= 'css/news.css') }}" rel="stylesheet"/>
<div class="news">
{% for newsitem in news_feed['news_list'] %}
    <div class="newsitem">
        <div class="channel"><img class="channelImage" src="{{ news_feed['image'] }}"/></div>
        <div class="headline">{{ newsitem['title'] }}</div>
        <div class="thumbnail"><img class="channelImage" src="{{ newsitem['thumbnail'] }}" alt="{{ newsitem['title'] }}"/></div>	
    </div>
{% endfor %}
</div>
